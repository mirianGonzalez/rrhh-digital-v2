<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ accion }} Usuario - RRHH DIGITAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}">
</head>
<body>
    <div class="sistema-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-building fa-2x"></i>
                <h3>RRHH DIGITAL</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('panel') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="{{ url_for('listar_legajos') }}"><i class="fas fa-folder"></i> Legajos</a></li>
                <li><a href="{{ url_for('ver_auditoria') }}"><i class="fas fa-history"></i> Auditoría</a></li>
                <li><a href="{{ url_for('listar_usuarios') }}" class="active"><i class="fas fa-users-cog"></i> Usuarios</a></li>
                <li><a href="{{ url_for('ver_manual') }}"><i class="fas fa-book"></i> Manual</a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Salir</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <h2><i class="fas fa-{% if accion == 'Nuevo' %}user-plus{% else %}user-edit{% endif %}"></i> {{ accion }} Usuario</h2>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>{{ session.usuario }} (ADMIN)</span>
                </div>
            </div>
            
            <div class="card m-4">
                <div class="card-body p-5">
                    <form method="POST">
                        <div class="grid grid-2 gap-4">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Nombre de Usuario *</label>
                                <input type="text" name="username" class="form-control" 
                                       value="{{ usuario.username if usuario else '' }}" 
                                       {% if usuario %}readonly{% endif %} required>
                            </div>
                            
                            {% if not usuario %}
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Contraseña *</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            {% endif %}
                            
                            <div class="form-group">
                                <label><i class="fas fa-tag"></i> Rol</label>
                                <select name="rol" class="form-control" required>
                                    <option value="ADMIN" {% if usuario and usuario.rol == 'ADMIN' %}selected{% endif %}>Administrador</option>
                                    <option value="RRHH" {% if usuario and usuario.rol == 'RRHH' %}selected{% endif %}>Recursos Humanos</option>
                                    <option value="CONSULTA" {% if not usuario or usuario.rol == 'CONSULTA' %}selected{% endif %}>Consulta</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" name="email" class="form-control" 
                                       value="{{ usuario.email if usuario else '' }}">
                            </div>
                            
                            {% if usuario %}
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="activo" value="1" {% if usuario.activo %}checked{% endif %}>
                                    Usuario Activo
                                </label>
                            </div>
                            
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="bloqueado" value="1" {% if usuario.bloqueado %}checked{% endif %}>
                                    Usuario Bloqueado
                                </label>
                            </div>
                            {% endif %}
                        </div>
                        
                        <div class="flex justify-end gap-3 mt-4">
                            <a href="{{ url_for('listar_usuarios') }}" class="btn btn-light">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
